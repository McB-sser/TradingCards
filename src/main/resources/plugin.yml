name: TradingCards
version: ${project.version}
main: de.mcbesser.tradingcards.TradingCardsPlugin
api-version: "1.20"
author: McB_sser
description: Sammelkarten-Plugin, das Motivbilder in Minecraft-Karten umwandelt.
commands:
  tradingcards:
    description: Hauptbefehl fuer das TradingCards-Plugin
    usage: /tradingcards <list|reload|give>
    permission: tradingcards.admin
    aliases: [tcards]
permissions:
  tradingcards.admin:
    description: Erlaubt das Verwalten von Sammelkarten-Motiven und das Geben von Karten
    default: op
  tradingcards.place:
    description: Erlaubt das Platzieren von Sammelkarten-Anzeigen
    default: true
  tradingcards.break:
    description: Erlaubt das Abbauen von Sammelkarten-Anzeigen
    default: true
